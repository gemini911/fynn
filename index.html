<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fynn — 全栈开发工程师</title>
  <meta name="description" content="专注于构建优雅、高效的数字产品。">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    :root {
      --bg: #FAFAFA;
      --text-primary: #1A1A1A;
      --text-secondary: #6B6B6B;
      --accent: #E63946;
      --border: #E5E5E5;
      --card-hover: #F8F8F8;

      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'DM Sans', system-ui, sans-serif;
      --font-chinese: 'Noto Serif SC', 'PingFang SC', serif;

      --space-xs: 8px;
      --space-sm: 16px;
      --space-md: 24px;
      --space-lg: 48px;
      --space-xl: 80px;
      --space-2xl: 120px;

      --max-width: 1200px;
      --header-height: 72px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    ::selection {
      background: var(--accent);
      color: white;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-lg);
      background: transparent;
      transition: background 0.3s, border-color 0.3s;
      z-index: 100;
      border-bottom: 1px solid transparent;
    }

    .header.scrolled {
      background: rgba(250, 250, 250, 0.9);
      backdrop-filter: blur(10px);
      border-bottom-color: var(--border);
    }

    .logo {
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 20px;
      color: var(--text-primary);
      text-decoration: none;
    }

    .nav {
      display: flex;
      gap: var(--space-lg);
    }

    .nav a {
      font-size: 14px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
      position: relative;
    }

    .nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .nav a:hover,
    .nav a.active {
      color: var(--text-primary);
    }

    .nav a:hover::after,
    .nav a.active::after {
      width: 100%;
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: var(--space-xs);
    }

    /* Main */
    main {
      padding-top: var(--header-height);
    }

    section {
      padding: var(--space-2xl) var(--space-lg);
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    /* Hero */
    .hero {
      min-height: calc(100vh - var(--header-height));
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 0;
      padding-bottom: 0;
    }

    .hero h1 {
      font-family: var(--font-serif);
      font-size: clamp(64px, 12vw, 140px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: var(--space-md);
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.8s ease forwards;
    }

    .hero .subtitle {
      font-family: var(--font-chinese);
      font-size: clamp(20px, 3vw, 28px);
      color: var(--text-secondary);
      margin-bottom: var(--space-lg);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s ease forwards;
      animation-delay: 0.2s;
    }

    .hero .bio {
      font-size: 16px;
      color: var(--text-secondary);
      max-width: 480px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s ease forwards;
      animation-delay: 0.4s;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Section Title */
    .section-title {
      font-family: var(--font-serif);
      font-size: 48px;
      font-weight: 400;
      margin-bottom: var(--space-xl);
      position: relative;
      display: inline-block;
    }

    .section-title::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 0;
      width: 40px;
      height: 2px;
      background: var(--accent);
    }

    /* Projects */
    .projects {
      background: white;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-md);
    }

    .project-card {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: var(--space-lg);
      transition: all 0.3s ease;
      opacity: 0;
      transform: translateY(30px);
    }

    .project-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .project-card:hover {
      background: var(--card-hover);
      transform: translateY(-4px);
    }

    .project-card h3 {
      font-family: var(--font-sans);
      font-size: 20px;
      font-weight: 500;
      margin-bottom: var(--space-sm);
      transition: color 0.2s;
    }

    .project-card:hover h3 {
      color: var(--accent);
    }

    .project-card p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: var(--space-md);
      line-height: 1.7;
    }

    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
    }

    .project-tag {
      font-size: 12px;
      color: var(--accent);
      background: rgba(230, 57, 70, 0.08);
      padding: 4px 12px;
      border-radius: 2px;
    }

    /* About */
    .about-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-xl);
      align-items: center;
    }

    .about-visual {
      aspect-ratio: 4/5;
      background: linear-gradient(135deg, var(--border) 0%, #D0D0D0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      font-size: 120px;
      color: white;
      opacity: 0.5;
    }

    .about-text h3 {
      font-family: var(--font-serif);
      font-size: 32px;
      margin-bottom: var(--space-md);
    }

    .about-text p {
      font-family: var(--font-chinese);
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: var(--space-md);
      line-height: 1.9;
    }

    .about-text p:last-of-type {
      margin-bottom: var(--space-lg);
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
    }

    .skill {
      font-size: 13px;
      color: var(--text-secondary);
      padding: 6px 14px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .skill:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Contact */
    .contact {
      background: white;
      text-align: center;
    }

    .contact .section-title {
      margin-bottom: var(--space-lg);
    }

    .contact-email {
      font-family: var(--font-serif);
      font-size: clamp(24px, 4vw, 40px);
      color: var(--text-primary);
      text-decoration: none;
      position: relative;
      display: inline-block;
    }

    .contact-email::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.4s ease;
    }

    .contact-email:hover::after {
      transform: scaleX(1);
      transform-origin: left;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: var(--space-md);
      margin-top: var(--space-lg);
    }

    .social-link {
      color: var(--text-secondary);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border: 1px solid var(--border);
    }

    .social-link:hover {
      color: var(--accent);
      border-color: var(--accent);
      transform: rotate(10deg);
    }

    /* Footer */
    footer {
      padding: var(--space-lg);
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
    }

    footer p {
      opacity: 0.6;
    }

    /* Mobile Menu */
    .mobile-menu {
      display: none;
      position: fixed;
      top: var(--header-height);
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-lg);
      z-index: 99;
    }

    .mobile-menu.open {
      display: flex;
    }

    .mobile-menu a {
      font-family: var(--font-serif);
      font-size: 32px;
      color: var(--text-primary);
      text-decoration: none;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      section {
        padding: var(--space-xl) var(--space-md);
      }

      .projects-grid {
        gap: var(--space-sm);
      }

      .project-card {
        padding: var(--space-md);
      }
    }

    @media (max-width: 768px) {
      .header {
        padding: 0 var(--space-md);
      }

      .nav {
        display: none;
      }

      .mobile-menu-btn {
        display: block;
      }

      .hero {
        min-height: auto;
        padding-top: var(--space-xl);
        padding-bottom: var(--space-xl);
      }

      .section-title {
        font-size: 36px;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }

      .about-content {
        grid-template-columns: 1fr;
      }

      .about-visual {
        aspect-ratio: 16/9;
        font-size: 80px;
      }

      .about-text {
        order: 2;
      }

      .about-visual {
        order: 1;
      }
    }

    /* Scroll reveal */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <header class="header" id="header">
    <a href="#" class="logo">Fynn.</a>
    <nav class="nav">
      <a href="#projects">作品</a>
    </nav>
    <button class="mobile-menu-btn" id="menuBtn" aria-label="菜单">
      <i data-lucide="menu" width="24" height="24"></i>
    </button>
  </header>

  <div class="mobile-menu" id="mobileMenu">
    <a href="#projects" class="mobile-link">作品</a>
  </div>

  <main>
    <section class="hero container">
      <h1>Fynn</h1>
      <p class="subtitle">全栈开发工程师 · 专注于构建优雅的数字产品</p>
      <p class="bio">
        热爱技术，痴迷于简洁优雅的代码实现。擅长大规模前端架构设计与性能优化，
        同时具备扎实的后端开发能力。追求极致的用户体验，相信好的产品始于好的代码。
      </p>
    </section>

    <section id="projects" class="projects">
      <div class="container">
        <h2 class="section-title">小工具</h2>
        <div class="projects-grid">
          <a href="https://hot.ricegrain.top/" target="_blank" rel="noopener" class="project-card">
            <h3>热门股票</h3>
            <p>实时追踪市场热点板块与概念股，帮助投资者快速发现短期趋势与机构布局机会。</p>
            <div class="project-tags">
              <span class="project-tag">股票</span>
              <span class="project-tag">数据分析</span>
              <span class="project-tag">实时行情</span>
            </div>
          </a>
          <a href="https://design.ricegrain.top/" target="_blank" rel="noopener" class="project-card">
            <h3>导航站</h3>
            <p>简洁高效的个人书签管理工具，快速导航到常用网站，支持自定义分类与搜索。</p>
            <div class="project-tags">
              <span class="project-tag">导航</span>
              <span class="project-tag">书签管理</span>
            </div>
          </a>
        </div>
      </div>
    </section>

  </main>

  <footer>
    <p>© 2026 Fynn. 用热爱构建，以代码为笔。</p>
  </footer>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Header scroll effect
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });

    // Mobile menu
    const menuBtn = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const mobileLinks = document.querySelectorAll('.mobile-link');

    menuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('open');
      const icon = menuBtn.querySelector('i');
      if (mobileMenu.classList.contains('open')) {
        icon.setAttribute('data-lucide', 'x');
      } else {
        icon.setAttribute('data-lucide', 'menu');
      }
      lucide.createIcons();
    });

    mobileLinks.forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.remove('open');
        const icon = menuBtn.querySelector('i');
        icon.setAttribute('data-lucide', 'menu');
        lucide.createIcons();
      });
    });

    // Active nav link
    const sections = document.querySelectorAll('section[id]');
    const navLinks = document.querySelectorAll('.nav a');

    window.addEventListener('scroll', () => {
      let current = '';
      sections.forEach(section => {
        const sectionTop = section.offsetTop;
        const sectionHeight = section.clientHeight;
        if (scrollY >= sectionTop - 200) {
          current = section.getAttribute('id');
        }
      });

      navLinks.forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('href') === `#${current}`) {
          link.classList.add('active');
        }
      });
    });

    // Scroll reveal for project cards
    const projectCards = document.querySelectorAll('.project-card');
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry, index) => {
        if (entry.isIntersecting) {
          setTimeout(() => {
            entry.target.classList.add('visible');
          }, index * 100);
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    projectCards.forEach(card => {
      revealObserver.observe(card);
    });

    // Smooth scroll for nav links
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }
      });
    });
  </script>
</body>
</html>
